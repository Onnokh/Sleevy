# Coolify-friendly compose file for the Sleevy monorepo.
#
# Coolify resolves SERVICE_FQDN_* variables to the public URL it assigns to a
# service and exposes a container by matching its internal port. Set the per-
# service domains in Coolify; defaults below let `docker compose up` work
# locally too.
#
# Required env (set in Coolify "Environment Variables"):
#   POSTGRES_PASSWORD            - Postgres superuser password
#   BETTER_AUTH_SECRET           - 32+ char random string
#   GOOGLE_CLIENT_ID / SECRET    - OAuth credentials
#
# Auto-injected by Coolify from the domains you set on each service:
#   SERVICE_URL_API              - public API URL (e.g. https://api.sleevy.app)
#   SERVICE_URL_WEB              - public web URL (e.g. https://sleevy.app)

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sleevy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sleevy}
      POSTGRES_DB: sleevy
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sleevy -d sleevy"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3002
      DATABASE_URL: postgres://sleevy:${POSTGRES_PASSWORD:-sleevy}@postgres:5432/sleevy
      REDIS_URL: redis://redis:6379
      # Standard libpq env so any pg client constructed without a connection
      # string (e.g. inside better-auth or other deps) still hits Postgres
      # instead of falling back to localhost.
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: sleevy
      PGPASSWORD: ${POSTGRES_PASSWORD:-sleevy}
      PGDATABASE: sleevy
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${SERVICE_URL_API:-http://localhost:3002}
      BETTER_AUTH_TRUSTED_ORIGINS: ${SERVICE_URL_WEB:-http://localhost:8080}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_PROVIDER: ${AI_PROVIDER:-}
      AI_MODEL: ${AI_MODEL:-}
    expose:
      - "3002"
    ports:
      - "3002:3002"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${SERVICE_URL_API:-http://localhost:3002}
        VITE_WEB_BASE_URL: ${SERVICE_URL_WEB:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "3000"
    ports:
      - "8080:3000"

volumes:
  postgres-data:
  redis-data:
